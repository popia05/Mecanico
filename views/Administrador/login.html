<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Auto Master</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../CSS/estilos-generales.css">
    <link rel="stylesheet" href="../../CSS/login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-left">
                <div class="brand-header">
                    <div class="brand-logo">
                        <img src="../logo.png.png" alt="Fuel Injection Auto Master logo">
                    </div>
                    <div>
                        <p class="brand-caption"><b>Fuel Injection</b></p>
                        <h1>Auto Master</h1>
                    </div>
                </div>

                <h2>Inicio Sesión</h2>

                <form id="loginForm">
                    <div class="input-group">
                        <label for="username">Email</label>
                        <input type="email" id="username" name="username" placeholder="ejemplo@correo.com" required>
                    </div>
                    <div class="input-group">
                        <label for="phone">Número de celular</label>
                        <input type="tel" id="phone" name="phone" placeholder="+52 612 345 6789" required>
                    </div>
                    <div class="input-group password-group">
                        <label for="password">Contraseña</label>
                        <div class="password-wrapper">
                            <input type="password" id="password" name="password" placeholder="Ingrese mínimo 8 caracteres" required>
                            <button type="button" class="password-toggle" aria-label="Mostrar contraseña">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                    <div class="form-footer">
                        <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
                    </div>
                    <button type="submit" class="btn-login">Iniciar Sesión</button>
                </form>
            </div>
            <div class="login-right">
                <div class="hero-card">
                    <div class="hero-image">
                        <img src="../logo.png.png" alt="Fuel Injection Auto Master logo">
                    </div>
                    <p><b>¡Comienza a optimizar el rendimiento de tu auto hoy!</b></p>
                </div>
            </div>
        </div>
    </div>
    <script src="../js/login.js"></script>
</body>
</html>
